version: "3.8"
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  auth:
    build:
      context: ./student-cohort-auth-module
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=mysecretkey
      - JWT_EXPIRES_IN=1h
    depends_on:
      - mongo

  middleware:
    build:
      context: ./Student-cohort-Middleware-integration
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - SECRET=mysecretkey
    depends_on:
      - auth

  user-service:
    build:
      context: ./chatsystem-user-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://mongo:27017/chatsystem
      - AUTH_VALIDATE_URL=http://auth:3001/auth/validate
    depends_on:
      - mongo
      - auth

volumes:
  mongo-data:
