openapi: 3.0.3
info:
  title: User Management API (Module 2)
  version: 1.0.0
  description: >-
    Minimal API for User Management. Responsibilities: create users (ADMIN only),
    fetch users, fetch user by id, and update user active status. Auth: Bearer JWT.
servers:
  - url: /api/v1
    description: Local API mount (use gateway in production)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserBase:
      type: object
      properties:
        user_id:
          type: string
          description: Public user identifier
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [ADMIN, MANAGER, STUDENT]
        is_active:
          type: boolean
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [user_id, name, email, role, is_active, created_at, updated_at]
      example:
        user_id: "643f1f7a9b1d4a3b2c0e1234"
        name: "Jane Doe"
        email: "jane@example.com"
        role: "MANAGER"
        is_active: true
        status: "ACTIVE"
        created_at: "2026-05-06T14:00:00Z"
        updated_at: "2026-05-06T14:05:00Z"

    UserCreate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          description: Plain password (server will hash before storing)
        role:
          type: string
          enum: [ADMIN, MANAGER, STUDENT]
      required: [name, email, password, role]

    UserStatusPatch:
      type: object
      properties:
        is_active:
          type: boolean
      required: [is_active]

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object

  responses:
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  parameters:
    user_id:
      name: user_id
      in: path
      required: true
      schema:
        type: string
      description: Public `user_id` (string)

security:
  - bearerAuth: []

paths:
  /users:
    get:
      summary: List users
      description: Returns a paginated list of users. Excludes soft-deleted users by default.
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [ADMIN, MANAGER, STUDENT]
          description: Filter by role
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE]
          description: Filter by user activity status
        - name: is_active
          in: query
          schema:
            type: boolean
          description: Filter by active status
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: includeDeleted
          in: query
          schema:
            type: boolean
            default: false
          description: Include soft-deleted users when true
        - name: fields
          in: query
          schema:
            type: string
          description: Comma-separated list of fields to project (e.g. user_id,name,role)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserBase'
                  page:
                    type: integer
                  limit:
                    type: integer
                  total:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      summary: Create a user (ADMIN only)
      description: Create a new user. `password` is accepted in the request and will be hashed server-side. The response exposes only `user_id`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (non-ADMIN)
        '409':
          description: Conflict - duplicate resource (e.g. email exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/ServerError'

  /users/{user_id}:
    get:
      summary: Get user details
      parameters:
        - $ref: '#/components/parameters/user_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBase'
        '401':
          description: Unauthorized
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/ServerError'

    patch:
      summary: Update user active status
      description: Update only the `is_active` field. Admins can toggle any account; users cannot change their own active status.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/user_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserStatusPatch'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  is_active:
                    type: boolean
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
        '500':
          $ref: '#/components/responses/ServerError'

tags:
  - name: users
    description: User management endpoints

externalDocs:
  description: Implementation notes
  url: https://example.com/docs/user-module-notes
