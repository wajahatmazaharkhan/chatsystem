openapi: 3.0.3
info:
  title: User Management API (Module 2)
  version: 1.0.0
  description: >-
    Minimal, internship-friendly OpenAPI spec for the User Management module.
    Auth: Bearer JWT. Times: UTC ISO 8601 (YYYY-MM-DDTHH:MM:SSZ).
servers:
  - url: /api/v1
    description: Local API mount (use gateway in production)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserBase:
      type: object
      properties:
        user_id:
          type: string
          description: Public user identifier (exposed as string)
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [ADMIN, MANAGER, STUDENT]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [user_id, name, email, role, is_active, created_at, updated_at]
    UserCreate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          description: Plain password (server will hash before storing)
        role:
          type: string
          enum: [ADMIN, MANAGER, STUDENT]
      required: [name, email, password, role]
    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
          enum: [ADMIN, MANAGER, STUDENT]
        is_active:
          type: boolean
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
  parameters:
    user_id:
      name: user_id
      in: path
      required: true
      schema:
        type: string
      description: Public `user_id` (as string)
security:
  - bearerAuth: []
paths:
  /users:
    get:
      summary: List users
      description: Returns a paginated list of users. Excludes soft-deleted users by default.
      parameters:
        - name: role
          in: query
          schema:
            type: string
          description: Filter by role
        - name: is_active
          in: query
          schema:
            type: boolean
          description: Filter by active status
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: includeDeleted
          in: query
          schema:
            type: boolean
            default: false
          description: Include soft-deleted users when true
        - name: fields
          in: query
          schema:
            type: string
          description: Comma-separated list of fields to project (e.g. user_id,name,role)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserBase'
                  page:
                    type: integer
                  limit:
                    type: integer
                  total:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a user (ADMIN only)
      description: Create a new user. `password` will be hashed server-side; response returns `user_id`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (non-ADMIN)
  /users/{user_id}:
    get:
      summary: Get user details
      parameters:
        - $ref: '#/components/parameters/user_id'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBase'
        '401':
          description: Unauthorized
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update user
      description: Partial updates allowed. Admins can update any user; users can update their own profile (enforced by RBAC middleware).
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/user_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
    delete:
      summary: Soft-delete user (ADMIN only)
      description: Sets `deleted_at` and `is_active=false`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/user_id'
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

tags:
  - name: users
    description: User management endpoints

externalDocs:
  description: Implementation notes
  url: https://example.com/docs/user-module-notes
