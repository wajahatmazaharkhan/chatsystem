openapi: 3.0.0

info:
  title: API Gateway
  version: 1.0.0
  description: Central gateway for auth, user, group, chat, activity, status, and analytics services.

servers:
  - url: http://localhost:4000
    description: Local API Gateway server

paths:
  /health:
    get:
      summary: Health check
      description: Returns gateway health status.
      responses:
        "200":
          description: Gateway healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /gateway/status:
    get:
      summary: Gateway service status
      description: Returns active gateway services and status information.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Gateway status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/login:
    post:
      summary: Login through auth service
      description: Proxies authentication credentials to the auth service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
                - email
                - password
      responses:
        "200":
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/validate:
    post:
      summary: Validate JWT token
      description: Proxies token validation requests to the auth service.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token validated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthValidateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        requestId:
          type: string
    HealthResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                healthy:
                  type: boolean
    GatewayStatusResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                services:
                  type: object
                  additionalProperties:
                    type: string
    AuthResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                token:
                  type: string
                expiresIn:
                  type: integer
                user:
                  type: object
                  additionalProperties:
                    type: object
    AuthValidateResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  type: object
                  additionalProperties:
                    type: object
  responses:
    Unauthorized:
      description: Authentication failed or missing token.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Unauthorized
              requestId:
                type: string
    BadRequest:
      description: Input validation failed.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Request validation failed
              requestId:
                type: string
              errors:
                type: array
                items:
                  type: string
